<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Title - Living Book</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --bg: #f5f1ea;
        --fg: #1a1a1a;
        --accent: #1a1a1a;
        --accent-dim: #4a4a4a;
        --gold: #b8860b;
        --gold-dim: #9c7409;
        --grey-900: #ebe6dc;
        --grey-800: #d8d2c4;
        --grey-700: #c0b8a8;
        --grey-600: #9a9183;
        --grey-500: #7a7263;
        --rule: 1px;
        --transition: 0.2s ease;
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        background-color: var(--bg);
        color: var(--fg);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 1.02rem;
        line-height: 1.7;
        letter-spacing: 0.1px;
        overflow-x: hidden;
    }

    /* Subtle paper texture overlay */
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' seed='4'/%3E%3C/filter%3E%3Crect width='400' height='400' filter='url(%23noiseFilter)' opacity='0.04' fill='%23000000'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 1;
        mix-blend-mode: multiply;
    }

    .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 64px;
        position: relative;
        z-index: 2;
    }

    /* Hero Section */
    .hero {
        padding: 96px 0 80px;
        position: relative;
        overflow: hidden;
        border-bottom: var(--rule) solid var(--gold);
    }

    .hero-content {
        position: relative;
        z-index: 3;
        display: flex;
        align-items: center;
        gap: 40px;
    }

    .profile-pic {
        width: 92px;
        height: 92px;
        min-width: 92px;
        border: 1px solid var(--grey-700);
        border-radius: 50%;
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 42px;
        flex-shrink: 0;
        background-color: var(--grey-900);
        box-shadow: 0 0 0 6px var(--bg), 0 0 0 7px var(--grey-800);
    }

    .hero-info {
        flex: 1;
    }

    .hero-header {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
        margin-bottom: 18px;
    }

    .hero h1 {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 3.2rem;
        font-weight: 700;
        font-style: italic;
        letter-spacing: -0.5px;
        line-height: 1.05;
        margin: 0;
        color: var(--fg);
    }

    .hero h1::after {
        content: '';
        display: block;
        width: 60px;
        height: 1px;
        background: var(--gold);
        margin-top: 18px;
    }

    .hero-actions {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
    }

    .hero-meta {
        font-size: 0.78rem;
        color: var(--grey-500);
        margin-bottom: 12px;
        font-family: 'IBM Plex Mono', monospace;
        letter-spacing: 1.5px;
        text-transform: uppercase;
    }

    .hero-desc {
        font-size: 1.15rem;
        color: var(--accent-dim);
        line-height: 1.8;
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        margin-top: 40px;
        padding-top: 32px;
        border-top: 1px solid var(--grey-800);
        column-count: 1;
    }

    .hero-desc strong {
        font-style: normal;
        font-weight: 700;
        color: var(--fg);
        font-family: 'Inter', -apple-system, sans-serif;
        letter-spacing: 0.2px;
    }

    .hero-desc em {
        font-style: italic;
        color: var(--fg);
    }

    .tag {
        border: none;
        padding: 0;
        font-size: 0.9rem;
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        text-transform: lowercase;
        letter-spacing: 0.2px;
        color: var(--gold);
        background: transparent;
        transition: color var(--transition);
    }

    .tag:hover {
        color: var(--gold-dim);
    }

    .btn {
        display: inline-block;
        border: none;
        padding: 4px 0;
        background-color: transparent;
        color: var(--fg);
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 2.5px;
        cursor: pointer;
        transition: color var(--transition);
        font-size: 0.72rem;
        text-decoration: none;
        position: relative;
    }

    .btn::after {
        content: '';
        position: absolute;
        left: 0;
        bottom: 0;
        width: 0;
        height: 1px;
        background: var(--gold);
        transition: width var(--transition);
    }

    .btn:hover {
        color: var(--gold);
    }

    .btn:hover::after {
        width: 100%;
    }

    .btn.outline {
        border: 1px solid var(--gold);
        padding: 9px 22px;
        background-color: transparent;
        color: var(--fg);
    }

    .btn.outline::after {
        display: none;
    }

    .btn.outline:hover {
        background-color: var(--gold);
        color: var(--bg);
    }

    /* Section */
    section {
        padding: 96px 0;
        border-bottom: var(--rule) solid var(--grey-800);
    }

    section h2 {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 2.4rem;
        font-weight: 700;
        font-style: italic;
        letter-spacing: -0.3px;
        margin-bottom: 56px;
        display: flex;
        align-items: baseline;
        gap: 18px;
        color: var(--fg);
    }

    section h2::before {
        content: '❦';
        color: var(--gold);
        font-size: 1.3rem;
        font-style: normal;
        transform: translateY(-2px);
    }

    section h2::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--gold);
        margin-left: 8px;
        opacity: 0.5;
    }

    /* Knowledge Graph + Chat side-by-side */
    .kchat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 48px;
        align-items: stretch;
    }

    .kchat-col h2 {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1.8rem;
        font-style: italic;
        margin-bottom: 18px;
    }

    .kgraph-container {
        position: relative;
        height: 520px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-top: 1px solid var(--gold);
        background-color: #fcfaf6;
        cursor: pointer;
        box-shadow: 0 1px 0 var(--grey-800), 0 12px 24px -16px rgba(0, 0, 0, 0.12);
    }

    .kgraph-container svg {
        width: 100%;
        height: 100%;
    }

    .kgraph-label {
        position: absolute;
        top: 8px;
        right: 0;
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 0.85rem;
        font-style: italic;
        letter-spacing: 0.3px;
        color: var(--gold);
        text-transform: lowercase;
    }

    /* Full-scale graph overlay */
    .kgraph-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(245, 241, 234, 0.98);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }

    .kgraph-overlay.active {
        display: flex;
    }

    .kgraph-overlay svg {
        width: 100%;
        height: 100%;
    }

    .kgraph-overlay-close {
        position: absolute;
        top: 28px;
        right: 36px;
        font-family: 'Inter', sans-serif;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 2.5px;
        color: var(--fg);
        background: none;
        border: 1px solid var(--gold);
        padding: 9px 18px;
        cursor: pointer;
        transition: all var(--transition);
        z-index: 1001;
    }

    .kgraph-overlay-close:hover {
        color: var(--bg);
        background-color: var(--gold);
    }

    .kgraph-overlay-title {
        position: absolute;
        top: 36px;
        left: 36px;
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1.4rem;
        font-style: italic;
        letter-spacing: -0.2px;
        color: var(--fg);
        text-transform: lowercase;
        z-index: 1001;
    }

    /* File Viewer Overlay */
    .file-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(245, 241, 234, 0.97);
        z-index: 1000;
        flex-direction: column;
        align-items: center;
        backdrop-filter: blur(4px);
    }

    .file-overlay.active {
        display: flex;
    }

    .file-overlay-header {
        width: 100%;
        max-width: 800px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 32px 48px 24px;
        flex-shrink: 0;
        border-bottom: 1px solid var(--gold);
        margin-bottom: 12px;
    }

    .file-overlay-title {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1.15rem;
        font-style: italic;
        letter-spacing: -0.2px;
        color: var(--fg);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .file-overlay-body {
        width: 100%;
        max-width: 800px;
        flex: 1;
        overflow-y: auto;
        padding: 16px 48px 64px;
        color: var(--fg);
        font-size: 1.05rem;
        line-height: 1.85;
        font-family: 'Inter', sans-serif;
    }

    .file-overlay-body > p:first-of-type:first-letter,
    .file-overlay-body .update-full > p:first-of-type:first-letter {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 4.6rem;
        font-weight: 700;
        color: var(--gold);
        float: left;
        line-height: 0.9;
        margin: 6px 12px 0 0;
        padding-top: 4px;
    }

    .file-overlay-body h1, .file-overlay-body h2, .file-overlay-body h3 {
        color: var(--fg);
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 700;
        margin-top: 36px;
        margin-bottom: 14px;
        letter-spacing: -0.3px;
    }

    .file-overlay-body h1 { font-size: 2rem; font-style: italic; }
    .file-overlay-body h2 { font-size: 1.55rem; }
    .file-overlay-body h3 { font-size: 1.25rem; font-style: italic; }

    .file-overlay-body a {
        color: var(--fg);
        text-decoration: none;
        border-bottom: 1px solid var(--gold);
        padding-bottom: 1px;
        transition: color var(--transition);
    }

    .file-overlay-body a:hover {
        color: var(--gold);
    }

    .file-overlay-body strong {
        color: var(--fg);
        font-weight: 700;
    }

    .file-overlay-body blockquote {
        border-left: 2px solid var(--gold);
        padding-left: 20px;
        margin: 18px 0;
        color: var(--grey-500);
        font-style: italic;
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1.1rem;
        line-height: 1.7;
    }

    .file-overlay-body ul, .file-overlay-body ol {
        margin-left: 24px;
        margin-top: 10px;
        margin-bottom: 10px;
    }

    .file-overlay-body code {
        background-color: var(--grey-900);
        padding: 2px 7px;
        border-radius: 2px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.88em;
        color: var(--fg);
    }

    .file-overlay-body img {
        max-width: 100%;
        margin: 18px 0;
    }

    .file-overlay-loading {
        display: flex;
        align-items: center;
        gap: 14px;
        color: var(--grey-500);
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-size: 1rem;
    }

    /* Updates Grid Section */
    .updates-section {
        padding: 96px 0;
        border-bottom: var(--rule) solid var(--grey-800);
    }

    .updates-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0;
        align-items: start;
    }

    /* Book Updates */
    .updates-list {
        display: flex;
        flex-direction: column;
        gap: 24px;
    }

    .update-card {
        border: none;
        border-top: 1px solid var(--gold);
        padding: 28px 0 32px;
        background-color: transparent;
        transition: background-color var(--transition);
        display: flex;
        flex-direction: column;
        min-height: 240px;
        position: relative;
    }

    .update-card:hover {
        background-color: var(--grey-900);
    }

    .update-card h3 {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1.5rem;
        font-weight: 600;
        font-style: italic;
        margin-bottom: 14px;
        letter-spacing: -0.3px;
        line-height: 1.25;
        color: var(--fg);
    }

    .permalink-icon {
        font-size: 0.7em;
        opacity: 0;
        text-decoration: none;
        transition: opacity var(--transition);
        vertical-align: middle;
        color: var(--gold);
    }

    .update-card:hover .permalink-icon {
        opacity: 0.6;
    }

    .permalink-icon:hover {
        opacity: 1 !important;
    }

    .update-meta {
        display: flex;
        gap: 14px;
        margin-bottom: 16px;
        font-size: 0.72rem;
        color: var(--grey-500);
        font-family: 'IBM Plex Mono', monospace;
        letter-spacing: 1.5px;
        text-transform: uppercase;
    }

    .update-date {
        letter-spacing: 1.5px;
    }

    .topics {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 18px;
        align-items: baseline;
    }

    .topics::before {
        content: 'filed under:';
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-size: 0.85rem;
        color: var(--grey-500);
        margin-right: 4px;
    }

    .topic-badge {
        background: transparent;
        color: var(--gold);
        padding: 0;
        font-size: 0.92rem;
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        text-transform: lowercase;
        letter-spacing: 0.2px;
        font-weight: 400;
        cursor: pointer;
        border: none;
        transition: color var(--transition);
    }

    .topic-badge:not(:last-child)::after {
        content: ' •';
        color: var(--grey-700);
        font-style: normal;
        margin-left: 6px;
    }

    .topic-badge:hover {
        color: var(--gold-dim);
        text-decoration: underline;
    }

    .update-preview {
        color: var(--accent-dim);
        font-size: 1rem;
        line-height: 1.75;
        flex: 1;
        display: -webkit-box;
        -webkit-line-clamp: 5;
        -webkit-box-orient: vertical;
        overflow: hidden;
        position: relative;
        font-family: 'Inter', sans-serif;
        letter-spacing: 0.15px;
    }

    .update-preview::first-letter {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 3.2rem;
        font-weight: 700;
        color: var(--gold);
        float: left;
        line-height: 0.85;
        margin: 4px 10px 0 0;
        padding-top: 2px;
    }

    .update-preview::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 28px;
        background: linear-gradient(transparent, var(--bg));
        pointer-events: none;
    }

    .update-card:hover .update-preview::after {
        background: linear-gradient(transparent, var(--grey-900));
    }

    .update-full {
        color: var(--fg);
        font-size: 1.02rem;
        line-height: 1.85;
        max-height: 500px;
        overflow-y: auto;
        max-width: 65ch;
        font-family: 'Inter', sans-serif;
    }

    .update-full > p:first-of-type::first-letter {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 3.6rem;
        font-weight: 700;
        color: var(--gold);
        float: left;
        line-height: 0.9;
        margin: 4px 10px 0 0;
        padding-top: 4px;
    }

    .update-full a, .update-preview a {
        color: var(--fg);
        text-decoration: none;
        border-bottom: 1px solid var(--gold);
        transition: color var(--transition);
    }

    .update-full a:hover, .update-preview a:hover {
        color: var(--gold);
    }

    a.wiki-link {
        color: var(--fg);
        text-decoration: none;
        border-bottom: 1px solid var(--gold);
        padding-bottom: 1px;
        transition: color var(--transition);
    }

    a.wiki-link:hover {
        color: var(--gold);
    }

    .update-full strong {
        color: var(--fg);
        font-weight: 700;
    }

    .update-full em {
        font-style: italic;
        color: var(--accent-dim);
        font-family: 'Playfair Display', Georgia, serif;
    }

    .update-full code {
        background-color: var(--grey-900);
        padding: 2px 6px;
        border-radius: 2px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.88em;
    }

    .update-full blockquote {
        border-left: 2px solid var(--gold);
        padding-left: 18px;
        margin: 16px 0;
        color: var(--grey-500);
        font-style: italic;
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1.08rem;
    }

    .update-full ul, .update-full ol {
        margin-left: 22px;
        margin-top: 10px;
        margin-bottom: 10px;
    }

    .update-full li {
        margin-bottom: 6px;
    }

    /* Chat message markdown styling */
    .chat-message a {
        color: var(--fg);
        text-decoration: none;
        border-bottom: 1px solid var(--gold);
    }

    .chat-message.human a {
        color: var(--fg);
        border-bottom-color: var(--gold);
    }

    .chat-message p {
        margin: 0 0 10px 0;
    }

    .chat-message p:last-child {
        margin-bottom: 0;
    }

    .chat-message ul, .chat-message ol {
        margin-left: 22px;
        margin-top: 6px;
        margin-bottom: 6px;
    }

    .chat-message code {
        background-color: rgba(0,0,0,0.06);
        padding: 1px 5px;
        border-radius: 2px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.88em;
    }

    .chat-message blockquote {
        border-left: 2px solid var(--gold);
        padding-left: 12px;
        margin: 6px 0;
        color: var(--grey-500);
        font-style: italic;
        font-family: 'Playfair Display', Georgia, serif;
    }

    .chat-prompts {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        padding: 12px 0;
    }

    .chat-prompt-btn {
        background: transparent;
        border: 1px solid var(--grey-800);
        color: var(--grey-500);
        padding: 9px 16px;
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-size: 0.92rem;
        cursor: pointer;
        transition: all var(--transition);
        border-radius: 1px;
    }

    .chat-prompt-btn:hover {
        border-color: var(--gold);
        color: var(--gold);
    }

    .more-button {
        text-align: center;
        margin-top: 64px;
    }

    /* Chat Section */
    .chat-container {
        border: none;
        border-top: 1px solid var(--gold);
        background-color: #fcfaf6;
        display: flex;
        flex-direction: column;
        height: 520px;
        box-shadow: 0 1px 0 var(--grey-800), 0 12px 24px -16px rgba(0, 0, 0, 0.12);
    }

    .chat-header {
        padding: 22px 28px;
        border-bottom: 1px solid var(--grey-800);
        background-color: transparent;
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-weight: 700;
        letter-spacing: -0.2px;
        font-size: 1.3rem;
        color: var(--fg);
    }

    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    .chat-message {
        padding: 14px 18px;
        border-radius: 2px;
        font-size: 0.98rem;
        line-height: 1.65;
        max-width: 86%;
        font-family: 'Inter', sans-serif;
    }

    .chat-message.human {
        align-self: flex-end;
        background-color: var(--grey-900);
        color: var(--fg);
        font-weight: 500;
        border-left: 3px solid var(--gold);
    }

    .chat-message.assistant {
        align-self: flex-start;
        background-color: transparent;
        color: var(--fg);
        border: 1px solid var(--grey-800);
    }

    .chat-message.system {
        align-self: center;
        color: var(--grey-500);
        font-size: 0.95rem;
        font-style: italic;
        font-family: 'Playfair Display', Georgia, serif;
    }

    .chat-input-area {
        padding: 20px 28px;
        border-top: 1px solid var(--grey-800);
        display: flex;
        gap: 10px;
    }

    .chat-input {
        flex: 1;
        background-color: transparent;
        color: var(--fg);
        border: none;
        border-bottom: 1px solid var(--grey-700);
        padding: 10px 4px;
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-size: 1.05rem;
        transition: all var(--transition);
        border-radius: 0;
    }

    .chat-input:focus {
        outline: none;
        border-bottom-color: var(--gold);
    }

    .chat-input::placeholder {
        color: var(--grey-600);
        font-style: italic;
    }

    .chat-send {
        background-color: transparent;
        color: var(--fg);
        border: 1px solid var(--gold);
        padding: 10px 22px;
        font-family: 'Inter', sans-serif;
        text-transform: uppercase;
        letter-spacing: 2.5px;
        font-weight: 500;
        font-size: 0.72rem;
        cursor: pointer;
        transition: all var(--transition);
    }

    .chat-send:hover {
        background-color: var(--gold);
        color: var(--bg);
    }

    .chat-send:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }

    /* Logging in state */
    .login-prompt {
        text-align: center;
        padding: 44px 20px;
        color: var(--grey-500);
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
    }

    .login-prompt p {
        margin-bottom: 20px;
    }

    /* Loading state */
    .loading {
        display: inline-block;
        width: 8px;
        height: 8px;
        background-color: var(--gold);
        border-radius: 50%;
        animation: pulse 1s infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
    }

    /* Tooltip */
    .graph-tooltip {
        position: fixed;
        padding: 18px 20px;
        background: #fcfaf6;
        border: 1px solid var(--gold);
        color: var(--fg);
        font-size: 0.92rem;
        font-family: 'Inter', sans-serif;
        pointer-events: none;
        z-index: 2000;
        max-width: 340px;
        box-shadow: 0 12px 32px rgba(26, 26, 26, 0.18);
        display: none;
        opacity: 0;
        transition: opacity 0.2s;
        border-radius: 1px;
    }
    .graph-tooltip h4 {
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-weight: 700;
        margin-bottom: 8px;
        color: var(--fg);
        font-size: 1.15rem;
        letter-spacing: -0.2px;
    }
    .graph-tooltip p {
        color: var(--accent-dim);
        line-height: 1.6;
        margin: 0;
    }

    /* KG Menu */
    .kg-menu {
        position: absolute;
        bottom: 44px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 4px;
        background: #fcfaf6;
        padding: 6px 10px;
        border: 1px solid var(--gold);
        border-radius: 100px;
        z-index: 1002;
        box-shadow: 0 6px 18px rgba(26, 26, 26, 0.1);
    }
    .kg-menu-item {
        color: var(--grey-500);
        font-family: 'Inter', sans-serif;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        padding: 5px 14px;
        transition: all var(--transition);
        border-radius: 100px;
    }
    .kg-menu-item:hover, .kg-menu-item.active {
        color: var(--bg);
        background-color: var(--gold);
    }

    /* Footer */
    footer a.footer-link {
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-size: 1rem;
        color: var(--grey-500);
        text-decoration: none;
        letter-spacing: 0.2px;
        text-transform: lowercase;
        transition: color var(--transition);
        border-bottom: 1px solid transparent;
        padding-bottom: 2px;
    }

    footer a.footer-link:hover {
        color: var(--gold);
        border-bottom-color: var(--gold);
    }

    /* Responsive */
    @media (max-width: 768px) {
        .container {
            padding: 0 24px;
            max-width: 100%;
        }

        .hero {
            padding: 56px 0 48px;
        }

        .hero-content {
            flex-direction: column;
            align-items: flex-start;
            gap: 20px;
        }

        .hero h1 {
            font-size: 2.1rem;
        }

        .hero-actions {
            flex-direction: row;
            flex-wrap: wrap;
            width: 100%;
            gap: 18px;
        }

        .btn.outline {
            padding: 8px 16px;
            font-size: 0.7rem;
        }

        section {
            padding: 64px 0;
        }

        section h2 {
            font-size: 1.7rem;
            margin-bottom: 36px;
        }

        .update-card {
            padding: 24px 0;
        }

        .update-card h3 {
            font-size: 1.3rem;
        }

        .update-preview::first-letter {
            font-size: 2.6rem;
        }

        .chat-container {
            height: 420px;
        }

        /* Stack KGraph + Chat on mobile */
        .kchat-grid {
            grid-template-columns: 1fr;
            gap: 32px;
        }

        .kgraph-container {
            height: 360px;
        }

        .updates-grid {
            grid-template-columns: 1fr;
            column-gap: 0;
        }

        .file-overlay-header {
            padding: 24px 24px 16px;
        }

        .file-overlay-body {
            padding: 12px 24px 48px;
            font-size: 1rem;
        }

        .file-overlay-body > p:first-of-type:first-letter,
        .file-overlay-body .update-full > p:first-of-type:first-letter {
            font-size: 3.2rem;
        }
    }
    </style>
</head>
<body>
    <div class="container">
        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-content">
                <div class="profile-pic" id="profilePic">🧠</div>
                <div class="hero-info">
                    <div class="hero-header">
                        <h1 id="vaultTitle">Loading...</h1>
                        <div class="hero-actions">
                            <!-- HERO_LINKS:START -->
                            <a href="https://www.gobispace.com/@your-slug?postId=OUTLINE_POST_ID" class="btn" target="_blank" rel="noopener">Outline</a>
                            <a href="https://your-previous-edition-url" class="btn" target="_blank" rel="noopener">Prior Edition</a>
                            <!-- HERO_LINKS:END -->
                            <!-- FEATURE:CHAT -->
                            <button class="btn" onclick="scrollToChat()">Chat</button>
                            <!-- /FEATURE:CHAT -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="hero-desc" id="vaultDesc"></div>
        </section>

        <!-- FEATURE:KGRAPH -->
        <div class="kgraph-overlay" id="kgraphOverlay">
            <span class="kgraph-overlay-title">knowledge graph</span>
            <button class="kgraph-overlay-close" onclick="closeKGraph()">Esc · Close</button>
            <div id="kgraphFull" style="width: 100%; height: 100%;"></div>
            <div id="graphTooltip" class="graph-tooltip"></div>
        </div>
        <!-- /FEATURE:KGRAPH -->

        <!-- FEATURE:FILE_VIEWER -->
        <div class="file-overlay" id="fileOverlay">
            <div class="file-overlay-header">
                <span class="file-overlay-title" id="fileOverlayTitle"></span>
                <button class="kgraph-overlay-close" onclick="closeFileViewer()">Esc · Close</button>
            </div>
            <div class="file-overlay-body" id="fileOverlayBody"></div>
        </div>
        <!-- /FEATURE:FILE_VIEWER -->

        <!-- Book Updates Section (full width) -->
        <section class="updates-section">
            <h2>Book Updates</h2>
            <div class="updates-grid" id="updatesList">
                <div style="color: var(--grey-500); font-family: 'Playfair Display', Georgia, serif; font-style: italic;">Loading…</div>
            </div>
            <!-- FEATURE:PAGINATION -->
            <div class="more-button">
                <button class="btn outline" onclick="loadMoreUpdates()">More Updates</button>
            </div>
            <!-- /FEATURE:PAGINATION -->
        </section>

        <!-- KGraph + Chat side-by-side -->
        <section id="chatSection" style="padding: 96px 0; border-bottom: var(--rule) solid var(--grey-800);">
            <div class="kchat-grid">
                <!-- FEATURE:KGRAPH -->
                <div class="kchat-col">
                    <h2>Knowledge Graph</h2>
                    <div class="kgraph-container" id="kgraph">
                        <span class="kgraph-label">click to expand</span>
                    </div>
                </div>
                <!-- /FEATURE:KGRAPH -->
                <!-- FEATURE:CHAT -->
                <div class="kchat-col">
                    <h2>Brain Chat</h2>
                    <div class="chat-container">
                        <div class="chat-header">Brain Chat</div>
                        <div class="chat-messages" id="chatMessages">
                            <div class="chat-message system">Log in to start chatting</div>
                            <div class="chat-prompts" id="chatPrompts" style="display: none;">
                                <button class="chat-prompt-btn" onclick="fillPrompt(this)">What topics do you write about most?</button>
                                <button class="chat-prompt-btn" onclick="fillPrompt(this)">Summarize your latest book update</button>
                                <button class="chat-prompt-btn" onclick="fillPrompt(this)">What are you working on recently?</button>
                            </div>
                        </div>
                        <div class="chat-input-area" id="chatInputArea" style="display: none;">
                            <input type="text" class="chat-input" id="chatInput" placeholder="Ask something…" />
                            <button class="chat-send" id="chatSend" onclick="sendMessage()">Send</button>
                        </div>
                    </div>
                </div>
                <!-- /FEATURE:CHAT -->
            </div>
        </section>

        <!-- Footer -->
        <footer style="padding: 48px 0 64px; text-align: center;">
            <a href="https://www.gobispace.com/@jyk?og=1" target="_blank" class="footer-link">powered by gobi</a>
        </footer>
    </div>

    <script>
    // Configure marked: gobispace file links and relative links open in popup, others in new tab
    const renderer = new marked.Renderer();
    renderer.link = function({ href, title, text }) {
        // Intercept gobispace.com file links
        const fileMatch = href && href.match(/gobispace\.com\/@[^?]+\?file=([^&]+)/);
        let filePath = '';
        let isPopup = false;

        if (fileMatch) {
            filePath = decodeURIComponent(fileMatch[1]).replace(/\+/g, ' ');
            isPopup = true;
        } else if (href && !href.startsWith('http') && !href.startsWith('#') && !href.startsWith('mailto:')) {
            // It's a relative path in the vault
            filePath = href;
            isPopup = true;
        }

        if (isPopup) {
            const safePath = filePath.replace(/'/g, "\\'");
            const safeLabel = text.replace(/'/g, "\\'").replace(/<[^>]*>?/gm, '');
            return `<a href="#" class="wiki-link" onclick="event.preventDefault(); event.stopPropagation(); openFileViewer('${safePath}', '${safeLabel}')">${text}</a>`;
        }
        return `<a href="${href}" target="_blank" rel="noopener"${title ? ` title="${title}"` : ''}>${text}</a>`;
    };

    renderer.image = function({ href, title, text }) {
        let finalHref = href;
        if (href && !href.startsWith('http') && !href.startsWith('data:')) {
            // Prepend webdrive URL for relative paths
            if (vault && vault.webdriveUrl) {
                finalHref = getFileUrl(href);
            }
        }
        return `<img src="${finalHref}" alt="${text || ''}"${title ? ` title="${title}"` : ''} style="max-width:100%">`;
    };

    marked.setOptions({ renderer });

    // Global state
    let vault = null;
    let currentSession = null;
    let allUpdates = [];
    let updatesCursor = null;
    let filterTopic = null;
    let infoVizOnly = false;

    // Initialize on load
    async function init() {
        // gobi.vault is available immediately
        vault = gobi.vault;
        updateHeroSection();
        await loadBrainUpdates();
        await initChat();
    }

    function updateHeroSection() {
        document.title = vault.title || 'Book';
        document.getElementById('vaultTitle').textContent = vault.title || 'Book';
        // BOOK_DESC: hand-edit this innerHTML block with the book's pitch.
        // Use <em> for italics and <strong> for non-italic bold emphasis (auto-styled).
        document.getElementById('vaultDesc').innerHTML = `
            <em>Prior Edition Title</em> — short pitch describing the lineage. Spine of the book and what's preserved. The two threads: <strong>essence that doesn't change</strong> (the foundations) and <strong>new judgment required</strong> (LLM-era updates). Reader segments — who this book is for and how each group should navigate it. Cadence statement (e.g., a <em>living book</em> over N weeks).
        `;

        // Profile picture
        if (vault.thumbnailPath) {
            const picUrl = `https://d16t3dioqz0xo9.cloudfront.net/${vault.thumbnailPath}@128x128.webp`;
            const picDiv = document.getElementById('profilePic');
            picDiv.style.backgroundImage = `url('${picUrl}')`;
            picDiv.style.backgroundSize = 'cover';
            picDiv.style.backgroundPosition = 'center';
            picDiv.textContent = '';
        }
    }

    async function loadBrainUpdates() {
        try {
            const result = await gobi.listPersonalPosts({ limit: 8, cursor: null, orderBy: 'createdAt' });
            allUpdates = result.data;
            updatesCursor = result.pagination?.nextCursor;
            renderUpdates();

            // Load more for richer k-graph and better filtering, then render
            let graphUpdates = [...allUpdates];
            let graphCursor = updatesCursor;
            for (let i = 0; i < 10 && graphCursor; i++) {
                const more = await gobi.listPersonalPosts({ limit: 8, cursor: graphCursor, orderBy: 'createdAt' });
                graphUpdates = graphUpdates.concat(more.data);
                graphCursor = more.pagination?.nextCursor;
            }

            allUpdates = graphUpdates; // Use full set for local filtering
            window.graphUpdates = graphUpdates;

            renderKGraph(graphUpdates);
        } catch (e) {
            console.error('Failed to load updates:', e);
            document.getElementById('updatesList').innerHTML =
                '<div style="color: var(--grey-500);">Failed to load updates</div>';
        }
    }

    function getFileUrl(path) {
        const { vaultId, webdriveUrl } = vault;
        // Ensure path is not double encoded
        const cleanPath = decodeURIComponent(path.replace(/\+/g, ' '));
        const encoded = cleanPath.split('/').map(encodeURIComponent).join('/');
        return `${webdriveUrl}/api/v1/file/raw/${vaultId}/${encoded}`;
    }

    function resolveWikiImages(markdown) {
        return markdown.replace(/!\[\[([^\]|]+)(?:\|(\d+))?\]\]/g, (_, path, width) => {
            const url = getFileUrl(path.trim());
            return width
                ? `<img src="${url}" alt="${path.trim()}" width="${width}" style="max-width:100%">`
                : `<img src="${url}" alt="${path.trim()}" style="max-width:100%">`;
        });
    }

    function resolveWikiLinks(markdown) {
        // [[path/to/file|display text]] → clickable inline popup viewer
        // [[path/to/file]] → filename only
        return markdown.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, (_, path, display) => {
            const label = display || path.split('/').pop();
            const filePath = path.trim() + (path.includes('.') ? '' : '.md');
            return `<a href="#" class="wiki-link" onclick="event.preventDefault(); event.stopPropagation(); openFileViewer('${escapeHtml(filePath)}', '${escapeHtml(label)}')">${escapeHtml(label)}</a>`;
        });
    }

    function renderUpdates() {
        const listContainer = document.getElementById('updatesList');

        // Apply filters
        let filtered = allUpdates;

        if (filterTopic) {
            filtered = filtered.filter(u => (u.topics || []).some(t => t.name === filterTopic));
        }

        if (infoVizOnly) {
            filtered = filtered.filter(u =>
                u.content.toLowerCase().includes('.html') ||
                (u.topics || []).some(t => t.name.toLowerCase().includes('viz') || t.name.toLowerCase().includes('인포'))
            );
        }

        // Show filter status if active
        let filterHeader = '';
        if (filterTopic || infoVizOnly) {
            filterHeader = `
                <div style="grid-column: 1 / -1; margin-bottom: 24px; display: flex; align-items: center; gap: 16px; font-family: 'Playfair Display', Georgia, serif; font-style: italic;">
                    <span style="color: var(--grey-500);">filtering by:</span>
                    ${filterTopic ? `<span class="topic-badge" style="margin-bottom: 0;">${filterTopic}</span>` : ''}
                    ${infoVizOnly ? `<span class="topic-badge" style="margin-bottom: 0; color: var(--fg);">infoviz</span>` : ''}
                    <button onclick="clearFilters()" style="background: none; border: 1px solid var(--gold); color: var(--fg); padding: 4px 14px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 2px;">Clear</button>
                </div>
            `;
        }

        const html = filtered.map((update) => {
            const processed = resolveWikiLinks(resolveWikiImages(update.content));
            const renderedContent = marked.parse(processed);
            const previewContent = marked.parse(resolveWikiLinks(update.content.substring(0, 300)));
            return `
            <div class="update-card" onclick="toggleUpdateDetail(event, ${update.id})" style="cursor: pointer;">
                <h3>${escapeHtml(update.title)} <a href="https://www.gobispace.com/@${vault.slug || 'jyk'}?postId=${update.id}" target="_blank" rel="noopener" onclick="event.stopPropagation();" class="permalink-icon" title="Permalink">¶</a></h3>
                <div class="update-meta">
                    <span class="update-date">${formatDate(update.createdAt)}</span>
                    <span>·</span>
                    <span>${Math.max(1, Math.ceil(update.content.length / 500))} min read</span>
                </div>
                ${update.topics?.length ? `
                    <div class="topics">
                        ${update.topics.slice(0, 3).map(t => `<span class="topic-badge" onclick="event.stopPropagation(); setTopicFilter('${escapeHtml(t.name)}')">${t.name}</span>`).join('')}
                    </div>
                ` : ''}
                <div class="update-preview" id="preview-${update.id}">${previewContent}</div>
                <div class="update-full" id="full-${update.id}" style="display: none;">${renderedContent}</div>
            </div>
        `;
        }).join('');

        listContainer.innerHTML = filterHeader + (html || '<div style="color: var(--grey-500); font-family: \'Playfair Display\', Georgia, serif; font-style: italic;">No matching updates found</div>');
    }

    function setTopicFilter(topicName) {
        filterTopic = topicName;
        renderUpdates();
        // If from mobile, scroll to top of list
        if (window.innerWidth <= 768) {
            document.querySelector('.updates-section').scrollIntoView({ behavior: 'smooth' });
        }
    }

    function setInfoVizFilter() {
        infoVizOnly = !infoVizOnly;
        renderUpdates();
        document.querySelector('.updates-section').scrollIntoView({ behavior: 'smooth' });
    }

    function clearFilters() {
        filterTopic = null;
        infoVizOnly = false;
        renderUpdates();
    }

    function toggleUpdateDetail(event, updateId) {
        if (event.target.closest('a')) return;
        const preview = document.getElementById(`preview-${updateId}`);
        const full = document.getElementById(`full-${updateId}`);
        if (preview.style.display !== 'none') {
            preview.style.display = 'none';
            full.style.display = 'block';
        } else {
            preview.style.display = 'block';
            full.style.display = 'none';
        }
    }

    async function loadMoreUpdates() {
        if (!updatesCursor) return;
        try {
            const result = await gobi.listPersonalPosts({ limit: 8, cursor: updatesCursor, orderBy: 'createdAt' });
            allUpdates = allUpdates.concat(result.data);
            updatesCursor = result.pagination?.nextCursor;
            renderUpdates();
        } catch (e) {
            console.error('Failed to load more:', e);
        }
    }

    async function initChat() {
        try {
            const sessions = await gobi.getSessions({ limit: 1 });
            if (sessions.data && sessions.data.length > 0) {
                currentSession = sessions.data[0];
                showChatUI();
                await loadChatHistory();
            } else {
                document.getElementById('chatMessages').innerHTML =
                    '<div class="chat-message system">Log in to start chatting</div>';
            }
        } catch (e) {
            console.error('Chat init error:', e);
        }
    }

    function showChatUI() {
        document.getElementById('chatInputArea').style.display = 'flex';
        document.getElementById('chatMessages').innerHTML = '';
        // Re-add prompt suggestions
        const prompts = document.createElement('div');
        prompts.className = 'chat-prompts';
        prompts.id = 'chatPrompts';
        prompts.innerHTML = `
            <button class="chat-prompt-btn" onclick="fillPrompt(this)">What topics do you write about most?</button>
            <button class="chat-prompt-btn" onclick="fillPrompt(this)">Summarize your latest book update</button>
            <button class="chat-prompt-btn" onclick="fillPrompt(this)">What are you working on recently?</button>
        `;
        document.getElementById('chatMessages').appendChild(prompts);
    }

    function fillPrompt(btn) {
        const input = document.getElementById('chatInput');
        input.value = btn.textContent;
        input.focus();
        // Hide prompts
        const prompts = document.getElementById('chatPrompts');
        if (prompts) prompts.style.display = 'none';
    }

    async function loadChatHistory() {
        try {
            const result = await gobi.loadMessages(currentSession.sessionId, { limit: 10 });
            const messages = result?.messages || result || [];
            if (Array.isArray(messages) && messages.length > 0) {
                document.getElementById('chatMessages').innerHTML = messages
                    .reverse()
                    .map(m => `
                        <div class="chat-message ${m.role}">
                            ${m.role === 'human' ? escapeHtml(m.content) : marked.parse(m.content)}
                        </div>
                    `).join('');
                scrollChatBottom();
            }
        } catch (e) {
            console.error('Failed to load history:', e);
            // Silently fail - empty chat is fine
        }
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        input.disabled = true;

        // Add user message
        const messagesDiv = document.getElementById('chatMessages');
        const userMsg = document.createElement('div');
        userMsg.className = 'chat-message human';
        userMsg.textContent = text;
        messagesDiv.appendChild(userMsg);
        scrollChatBottom();

        // Add loading indicator
        const loadingMsg = document.createElement('div');
        loadingMsg.className = 'chat-message assistant';
        loadingMsg.innerHTML = '<div class="loading"></div>';
        messagesDiv.appendChild(loadingMsg);
        scrollChatBottom();

        try {
            let response = '';
            await gobi.sendMessage(currentSession.sessionId, text, (delta) => {
                response += delta;
                loadingMsg.innerHTML = marked.parse(response);
                scrollChatBottom();
            });
            input.disabled = false;
            input.focus();
        } catch (e) {
            console.error('Send error:', e);
            loadingMsg.textContent = 'Error: ' + e.message;
            input.disabled = false;
        }
    }

    function scrollChatBottom() {
        const msgs = document.getElementById('chatMessages');
        setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 0);
    }

    function scrollToChat() {
        document.getElementById('chatSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function formatDate(isoString) {
        const date = new Date(isoString);
        return date.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
    }

    function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Store graph data for full-scale view
    let kgraphData = null;

    function buildGraphData(updates) {
        const nodes = [];
        const links = [];
        const topicCounts = new Map(); // name -> count

        // 1. Count topic occurrences across all updates
        updates.forEach(u => {
            (u.topics || []).forEach(t => {
                topicCounts.set(t.name, (topicCounts.get(t.name) || 0) + 1);
            });
        });

        // 2. Get top 30 topics
        const topTopicNames = Array.from(topicCounts.entries())
            .sort((a, b) => b[1] - a[1])
            .slice(0, 30)
            .map(entry => entry[0]);
        const topTopicsSet = new Set(topTopicNames);

        const topicNodesMap = new Map(); // name -> node
        const postNodesMap = new Map();  // id -> node

        // 3. Create nodes and links for top topics and their posts
        updates.forEach(u => {
            const relevantTopics = (u.topics || []).filter(t => topTopicsSet.has(t.name));

            // Only add post if it links to at least one top topic
            if (relevantTopics.length > 0) {
                const postNode = {
                    id: `post-${u.id}`,
                    idNum: u.id,
                    type: 'post',
                    title: u.title,
                    content: u.content.substring(0, 200) + '...',
                    date: u.createdAt,
                    val: 1
                };
                nodes.push(postNode);
                postNodesMap.set(u.id, postNode);

                relevantTopics.forEach(t => {
                    let topicNode = topicNodesMap.get(t.name);
                    if (!topicNode) {
                        topicNode = {
                            id: `topic-${t.name}`,
                            type: 'topic',
                            name: t.name,
                            val: topicCounts.get(t.name)
                        };
                        topicNodesMap.set(t.name, topicNode);
                        nodes.push(topicNode);
                    }

                    links.push({
                        source: postNode.id,
                        target: topicNode.id,
                        type: 'post-topic'
                    });
                });
            }
        });

        // 4. Link top topics to each other if they share posts
        const names = Array.from(topicNodesMap.keys());
        for (let i = 0; i < names.length; i++) {
            for (let j = i + 1; j < names.length; j++) {
                const t1 = names[i];
                const t2 = names[j];
                const sharedCount = updates.filter(u => {
                    const uTopics = (u.topics || []).map(t => t.name);
                    return uTopics.includes(t1) && uTopics.includes(t2);
                }).length;

                if (sharedCount > 0) {
                    links.push({
                        source: `topic-${t1}`,
                        target: `topic-${t2}`,
                        weight: sharedCount,
                        type: 'topic-topic'
                    });
                }
            }
        }

        return { nodes, links };
    }

    function drawGraph(containerId, width, height, data, opts = {}) {
        const { nodeRange = [4, 16], fontSize = '9px', distance = 100, charge = -150 } = opts;
        const container = document.getElementById(containerId);
        const tooltip = document.getElementById('graphTooltip');
        container.querySelectorAll('svg').forEach(s => s.remove());

        // Shallow copy for D3
        let nodes = data.nodes.map(d => ({ ...d }));
        let links = data.links.map(d => ({ ...d }));

        // Filter based on active menu item
        const activeFilter = document.querySelector('.kg-menu-item.active')?.textContent.toLowerCase() || 'all';
        if (activeFilter === 'post') {
            nodes = nodes.filter(n => n.type === 'post');
            links = []; // Only posts, no links in this mode
        } else if (activeFilter === 'topic') {
            nodes = nodes.filter(n => n.type === 'topic');
            links = links.filter(l => l.type === 'topic-topic');
        }

        if (nodes.length === 0) return;

        const svg = d3.select(`#${containerId}`)
            .append('svg')
            .attr('viewBox', `0 0 ${width} ${height}`)
            .attr('preserveAspectRatio', 'xMidYMid meet');

        const maxVal = d3.max(nodes, d => d.val) || 1;
        const radiusScale = d3.scaleSqrt().domain([1, maxVal]).range(nodeRange);

        const simulation = d3.forceSimulation(nodes)
            .force('link', d3.forceLink(links).id(d => d.id).distance(l => l.type === 'post-topic' ? distance * 0.4 : distance).strength(0.5))
            .force('charge', d3.forceManyBody().strength(charge))
            .force('center', d3.forceCenter(width / 2, height / 2))
            .force('collision', d3.forceCollide().radius(d => d.type === 'topic' ? radiusScale(d.val) + 20 : 12));

        const link = svg.append('g')
            .selectAll('line')
            .data(links.filter(l => l.type === 'post-topic'))
            .join('line')
            .attr('stroke', 'var(--grey-700)')
            .attr('stroke-width', 1)
            .attr('stroke-opacity', 0.4);

        const node = svg.append('g')
            .selectAll('g')
            .data(nodes)
            .join('g')
            .style('cursor', 'pointer')
            .on('mouseenter', (event, d) => {
                if (containerId !== 'kgraphFull') return; // Only tooltips in full view
                tooltip.style.display = 'block';
                tooltip.style.opacity = '1';

                let content = '';
                if (d.type === 'post') {
                    content = `<h4>${escapeHtml(d.title)}</h4><p>${escapeHtml(d.content)}</p><div style="margin-top:8px; font-size: 0.7rem; color: var(--gold); font-family: 'IBM Plex Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase;">${formatDate(d.date)}</div>`;
                } else {
                    content = `<h4>${escapeHtml(d.name)}</h4><p>${d.val} linked book updates</p>`;
                }
                tooltip.innerHTML = content;
            })
            .on('mousemove', (event) => {
                tooltip.style.left = (event.clientX + 20) + 'px';
                tooltip.style.top = (event.clientY + 20) + 'px';
            })
            .on('mouseleave', () => {
                tooltip.style.opacity = '0';
                setTimeout(() => { if(tooltip.style.opacity === '0') tooltip.style.display = 'none'; }, 200);
            })
            .on('click', (event, d) => {
                if (d.type === 'post') {
                    const postId = d.idNum || parseInt(d.id.split('-')[1]);
                    openBUInline(postId);
                } else if (d.type === 'topic') {
                    showTopicBUs(d.name);
                }
            });

        node.append('circle')
            .attr('r', d => d.type === 'post' ? 4 : radiusScale(d.val))
            .attr('fill', d => d.type === 'post' ? '#a8a094' : 'transparent')
            .attr('stroke', d => d.type === 'post' ? '#9a9183' : '#1a1a1a')
            .attr('stroke-width', d => d.type === 'post' ? 1 : 1.2)
            .attr('fill-opacity', d => d.type === 'post' ? 0.85 : 0);

        node.append('text')
            .text(d => d.type === 'post' ? '' : d.name)
            .attr('dy', d => radiusScale(d.val) + 16)
            .attr('text-anchor', 'middle')
            .attr('fill', '#1a1a1a')
            .attr('font-family', 'Playfair Display, Georgia, serif')
            .attr('font-style', 'italic')
            .attr('font-size', d => d.type === 'post' ? '0px' : fontSize)
            .attr('letter-spacing', '0.2px');

        simulation.on('tick', () => {
            link
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);
            node.attr('transform', d => {
                d.x = Math.max(40, Math.min(width - 40, d.x));
                d.y = Math.max(40, Math.min(height - 40, d.y));
                return `translate(${d.x},${d.y})`;
            });
        });

        node.call(d3.drag()
            .on('start', (event, d) => {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x; d.fy = d.y;
            })
            .on('drag', (event, d) => {
                d.fx = event.x; d.fy = event.y;
            })
            .on('end', (event, d) => {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null; d.fy = null;
            })
        );
    }

    function renderKGraph(updates) {
        kgraphData = buildGraphData(updates);
        if (kgraphData.nodes.length === 0) return;

        const container = document.getElementById('kgraph');
        const width = container.clientWidth || 400;
        const height = container.clientHeight || 280;
        drawGraph('kgraph', width, height, kgraphData);

        // Click to open full-scale
        container.addEventListener('click', openKGraph);
    }

    function openKGraph() {
        if (!kgraphData || kgraphData.nodes.length === 0) return;
        const overlay = document.getElementById('kgraphOverlay');
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';

        const w = window.innerWidth;
        const h = window.innerHeight;
        drawGraph('kgraphFull', w, h, kgraphData, {
            nodeRange: [8, 40],
            fontSize: '13px',
            distance: 180,
            charge: -600
        });
    }

    function openBUInline(updateId) {
        // Search in all available updates
        const sourceUpdates = window.graphUpdates || allUpdates;
        const update = sourceUpdates.find(u => u.id === updateId);
        if (!update) return;

        const overlay = document.getElementById('fileOverlay');
        const title = document.getElementById('fileOverlayTitle');
        const body = document.getElementById('fileOverlayBody');
        const vaultSlug = (vault && vault.slug) ? vault.slug : 'jyk';

        title.textContent = update.title;
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';

        const processed = resolveWikiLinks(resolveWikiImages(update.content));
        const topicsHtml = update.topics?.length
            ? `<div class="topics" style="margin-bottom: 24px;">${update.topics.map(t => `<span class="topic-badge">${t.name}</span>`).join('')}</div>`
            : '';
        const metaHtml = `<div class="update-meta" style="margin-bottom: 8px;"><span>${formatDate(update.createdAt)}</span></div>`;

        body.innerHTML = `
            ${metaHtml}
            ${topicsHtml}
            <div class="update-full">${marked.parse(processed)}</div>
            <div style="margin-top: 56px; border-top: 1px solid var(--gold); padding-top: 28px;">
                <a href="https://www.gobispace.com/@${vaultSlug}?postId=${update.id}" target="_blank" class="btn outline">View on GobiSpace</a>
            </div>
        `;
    }

    function showTopicBUs(topicName) {
        // Use graphUpdates which contains more posts than allUpdates
        const sourceUpdates = window.graphUpdates || allUpdates;
        const linkedUpdates = sourceUpdates.filter(u =>
            (u.topics || []).some(t => t.name === topicName)
        );

        if (linkedUpdates.length === 0) return;

        const overlay = document.getElementById('fileOverlay');
        const title = document.getElementById('fileOverlayTitle');
        const body = document.getElementById('fileOverlayBody');
        const vaultSlug = (vault && vault.slug) ? vault.slug : 'jyk';

        title.textContent = topicName;
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';

        const listHtml = linkedUpdates.map(u => `
            <div style="margin-bottom: 28px; padding-bottom: 28px; border-bottom: 1px solid var(--grey-800);">
                <h3 style="margin-top: 0; margin-bottom: 10px; font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-weight: 600; font-size: 1.4rem; letter-spacing: -0.3px;">
                    <a href="#" onclick="event.preventDefault(); openBUInline(${u.id})" style="text-decoration: none; color: var(--fg); border: none;">
                        ${escapeHtml(u.title)}
                    </a>
                    <a href="https://www.gobispace.com/@${vaultSlug}?postId=${u.id}" target="_blank" rel="noopener" onclick="event.stopPropagation();" style="text-decoration: none; border: none;">
                        <span style="font-size: 0.7rem; color: var(--gold); vertical-align: middle; margin-left: 8px;">¶</span>
                    </a>
                </h3>
                <div style="font-size: 0.72rem; color: var(--grey-500); margin-bottom: 14px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase;">${formatDate(u.createdAt)}</div>
                <div style="font-size: 1rem; color: var(--accent-dim); line-height: 1.7; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; cursor: pointer;" onclick="openBUInline(${u.id})">
                    ${escapeHtml(u.content.substring(0, 200))}...
                </div>
            </div>
        `).join('');

        body.innerHTML = `
            <div style="padding-top: 12px;">
                <p style="color: var(--grey-500); margin-bottom: 36px; font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-size: 1rem;">Found ${linkedUpdates.length} book updates filed under this topic.</p>
                ${listHtml}
            </div>
        `;
    }

    function closeKGraph() {
        const overlay = document.getElementById('kgraphOverlay');
        overlay.classList.remove('active');
        document.body.style.overflow = '';
        document.getElementById('kgraphFull').innerHTML = '';
    }

    // File Viewer
    async function openFileViewer(filePath, label) {
        const overlay = document.getElementById('fileOverlay');
        const title = document.getElementById('fileOverlayTitle');
        const body = document.getElementById('fileOverlayBody');

        // Normalize path: strip query params and ensure extension
        // Also handle encoded paths coming from standard markdown links
        let cleanPath = decodeURIComponent(filePath.split('?')[0].split('&')[0].trim());
        if (!cleanPath.includes('.') && !cleanPath.endsWith('/')) cleanPath += '.md';

        title.textContent = label;
        body.innerHTML = '<div class="file-overlay-loading"><div class="loading"></div> Loading…</div>';
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';

        try {
            if (cleanPath.toLowerCase().endsWith('.html')) {
                const url = getFileUrl(cleanPath);
                body.innerHTML = `<iframe src="${url}" style="width: 100%; height: 100%; border: none; background: white;"></iframe>`;
                body.style.padding = '0';
                body.style.overflow = 'hidden';
                return;
            }

            // Default: Read as markdown
            body.style.padding = '16px 48px 64px';
            body.style.overflowY = 'auto';

            const content = await gobi.readFile(cleanPath);
            // Strip YAML frontmatter
            const stripped = content.replace(/^---\n[\s\S]*?\n---\n*/, '');
            const processed = resolveWikiLinks(resolveWikiImages(stripped));
            body.innerHTML = marked.parse(processed);
        } catch (e) {
            body.innerHTML = `<div style="color: var(--grey-500); font-family: 'Playfair Display', Georgia, serif; font-style: italic; padding: 32px;">File not found: ${escapeHtml(cleanPath)}</div>`;
        }
    }

    function closeFileViewer() {
        const overlay = document.getElementById('fileOverlay');
        overlay.classList.remove('active');
        document.body.style.overflow = '';
        document.getElementById('fileOverlayBody').innerHTML = '';
    }

    // ESC key to close overlays
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeKGraph();
            closeFileViewer();
        }
    });

    // Click backdrop to close file viewer
    document.getElementById('fileOverlay').addEventListener('click', (e) => {
        if (e.target === document.getElementById('fileOverlay')) closeFileViewer();
    });

    // Start when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    </script>
