# Gobi Desktop / CLI configuration for this vault.
#
# After cloning this repo, run the two commands below to populate the slugs.
# Do NOT hand-edit vaultSlug / selectedSpaceSlug — they must come from the server.
#
#   gobi init           # log in (if needed), create or pick a vault, writes vaultSlug
#   gobi space warp     # pick the Gobi space this vault publishes to, writes selectedSpaceSlug
#
# After both run, this file will look like:
#
#   vaultSlug: <auto-generated, e.g. brave-path-zr962w>
#   selectedSpaceSlug: <space-slug-you-picked>
#   orchestratorEnabled: false
#
# See `90. Settings/gobi/Skills/gobi-onboarding/SKILL.md` for the full first-run flow.

orchestratorEnabled: false

# Voice settings — leave commented unless you opt into Gobi Desktop voice mode.
# Uncomment and adjust paths/credentials to enable.
#
# voiceSettings:
#   primaryLanguage: en      # ko | en | ja | etc.
#   secondaryLanguage: ko
#   micGain: 0.2
#   systemPromptFile: "90. Settings/gobi/Prompts/Real-time Voice Assistant (RVA).md"
#   llmProvider: claude-cli
#   llmConfig:
#     cli:
#       claudePath: /Users/<your-username>/.local/bin/claude
