<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain</title>
<style>
:root {
  --bg: #000000;
  --fg: #ffffff;
  --muted: #888888;
  --border: #1a1a1a;
  --accent: #ccff00;
  --accent-dim: #99cc00;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  line-height: 1.5;
  padding: 32px 24px;
  max-width: 720px;
  margin: 0 auto;
}
.hero { display: flex; gap: 20px; align-items: center; margin-bottom: 40px; }
.thumb {
  width: 72px; height: 72px;
  border-radius: 12px;
  background: var(--border);
  flex-shrink: 0;
  object-fit: cover;
}
.hero h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
.hero p { color: var(--muted); font-size: 14px; }
section { margin-bottom: 36px; }
section h2 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 14px;
  font-weight: 600;
}
.list { display: flex; flex-direction: column; gap: 10px; }
.item {
  background: var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  transition: background 0.15s;
}
.item:hover { background: #2a2a2a; }
.item-title {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.item-meta { font-size: 12px; color: var(--muted); }
.empty { color: var(--muted); font-size: 13px; padding: 14px 16px; }
.footer {
  margin-top: 60px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
  text-align: center;
}
.footer a { color: var(--accent); text-decoration: none; }
.footer a:hover { color: var(--accent-dim); }
@media (max-width: 480px) {
  body { padding: 20px 16px; }
  .hero { flex-direction: column; text-align: center; }
}
</style>
</head>
<body>
  <div class="hero">
    <img id="thumb" class="thumb" alt="">
    <div>
      <h1 id="title">Brain</h1>
      <p id="description"></p>
    </div>
  </div>

  <section>
    <h2>Recent Brain Updates</h2>
    <div id="updates" class="list">
      <div class="empty">Loading…</div>
    </div>
  </section>

  <section>
    <h2>Recent Chats</h2>
    <div id="sessions" class="list">
      <div class="empty">Loading…</div>
    </div>
  </section>

  <div class="footer">
    Built on <a href="https://system.cmdspace.work" target="_blank">CMDS</a> ·
    Customize this page with <code>/CBH</code> (Create Brain Homepage)
  </div>

<script>
(async function() {
  if (typeof window.gobi === 'undefined') {
    document.getElementById('updates').innerHTML = '<div class="empty">Open this page in Gobi Desktop or Gobi Space to see live data.</div>';
    document.getElementById('sessions').innerHTML = '';
    return;
  }
  try {
    const v = window.gobi.vault;
    document.getElementById('title').textContent = v.title || 'Brain';
    document.getElementById('description').textContent = v.description || '';
    if (v.thumbnailPath) {
      document.getElementById('thumb').src = `https://d16t3dioqz0xo9.cloudfront.net/${v.thumbnailPath}@128x128.webp`;
    }
  } catch (e) { console.error('vault load failed', e); }

  try {
    const result = await window.gobi.listBrainUpdates({ limit: 5 });
    const updates = result?.data || [];
    const el = document.getElementById('updates');
    if (updates.length === 0) {
      el.innerHTML = '<div class="empty">No updates yet. Use <code>/PBU</code> in Claude Code to publish.</div>';
    } else {
      el.innerHTML = updates.map(u => `
        <div class="item">
          <div class="item-title">${escapeHtml(u.title || '(untitled)')}</div>
          <div class="item-meta">${formatDate(u.createdAt || u.created)}</div>
        </div>
      `).join('');
    }
  } catch (e) {
    document.getElementById('updates').innerHTML = '<div class="empty">Could not load updates.</div>';
  }

  try {
    const sessionsResult = await window.gobi.getSessions({ limit: 5 });
    const sessions = sessionsResult?.data || [];
    const el = document.getElementById('sessions');
    if (sessions.length === 0) {
      el.innerHTML = '<div class="empty">No chat sessions yet.</div>';
    } else {
      el.innerHTML = sessions.map(s => `
        <div class="item">
          <div class="item-title">${escapeHtml(s.title || '(no title)')}</div>
          <div class="item-meta">${formatDate(s.updatedAt || s.createdAt)}</div>
        </div>
      `).join('');
    }
  } catch (e) {
    document.getElementById('sessions').innerHTML = '<div class="empty">Could not load sessions.</div>';
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }
  function formatDate(d) {
    if (!d) return '';
    try { return new Date(d).toLocaleDateString(); } catch (e) { return String(d); }
  }
})();
</script>
</body>
</html>
